name: Publish Vue and Nuxt packages 🚀

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # Early validation: pack & check both packages before any real publish,
      # so a misconfiguration fails fast without partially publishing.
      - name: 'Validate packages (dry-run) 🧪'
        run: |
          pnpm --filter ./packages/@bitrix24-icons-vue publish --access public --no-git-checks --dry-run
          pnpm --filter ./packages/@bitrix24-icons-nuxt publish --access public --no-git-checks --dry-run

      # Publishing uses npm Trusted Publishing (OIDC) — no token needed.
      # Requires `id-token: write` (set above) and each package to be
      # registered as a trusted publisher for this repo/workflow on npmjs.com.
      # `--provenance` attaches a signed build provenance attestation via OIDC.
      - name: 'Publish Vue package 🚀'
        shell: bash
        run: pnpm --filter ./packages/@bitrix24-icons-vue publish --access public --no-git-checks --provenance

      - name: 'Publish Nuxt package 🚀'
        run: pnpm --filter ./packages/@bitrix24-icons-nuxt publish --access public --no-git-checks --provenance
